<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Star Hunters ⭐</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
html,body { height:100%; overflow:hidden; font-family:-apple-system,'Segoe UI',Arial,sans-serif; }
body { background:#1a0b3d; color:#fff; }

/* animated bg */
#bg { position:fixed; inset:0; z-index:0;
  background:linear-gradient(-45deg,#2b1055,#5b21b6,#1e3a8a,#7c2d92);
  background-size:400% 400%; animation:bgmove 14s ease infinite; }
@keyframes bgmove { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
.spark { position:fixed; color:#fff; opacity:.7; pointer-events:none; z-index:1; animation:sparkfloat linear infinite; }
@keyframes sparkfloat { 0%{transform:translateY(105vh) scale(.5);opacity:0} 10%{opacity:.8} 90%{opacity:.6} 100%{transform:translateY(-10vh) scale(1.2);opacity:0} }

#app { height:100%; display:flex; flex-direction:column; max-width:520px; margin:0 auto; position:relative; z-index:2; }

#topbar { display:flex; align-items:center; justify-content:space-between; padding:calc(env(safe-area-inset-top) + 8px) 14px 6px; }
#topbar .title { font-size:18px; font-weight:900; letter-spacing:.5px; text-shadow:0 0 12px #f0f; }
#stars { background:linear-gradient(135deg,#fbbf24,#f97316); border-radius:20px; padding:6px 14px; font-weight:900; font-size:17px; box-shadow:0 3px 8px rgba(0,0,0,.4); transition:transform .2s; }
#stars.pulse { transform:scale(1.35); }
#homeBtn { background:rgba(255,255,255,.18); border:none; color:#fff; font-size:20px; border-radius:16px; padding:7px 13px; }
#homeBtn:active { transform:scale(.9); }

.screen { flex:1; display:none; flex-direction:column; align-items:center; padding:6px 14px calc(env(safe-area-inset-bottom) + 18px); overflow-y:auto; -webkit-overflow-scrolling:touch; }
.screen.active { display:flex; animation:screenIn .35s cubic-bezier(.2,1.4,.4,1); }
@keyframes screenIn { from{opacity:0; transform:translateY(24px) scale(.96)} to{opacity:1; transform:none} }

h1 { font-size:30px; text-align:center; margin:4px 0;
  background:linear-gradient(90deg,#fde047,#f472b6,#a78bfa,#fde047); background-size:300% auto;
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  animation:shimmer 3s linear infinite; font-weight:900; }
@keyframes shimmer { to{background-position:300% center} }
h2 { font-size:21px; text-align:center; margin:4px 0; text-shadow:0 2px 6px rgba(0,0,0,.5); }
.sub { opacity:.85; text-align:center; font-size:14px; margin-bottom:6px; }

/* home */
#homeGirls { display:flex; justify-content:center; align-items:flex-end; gap:2px; width:100%; margin:2px 0 6px; }
.homeGirl { width:31%; position:relative; border-radius:20px; padding:4px 0 0; transition:transform .25s; }
.homeGirl svg { width:100%; animation:dance 1.6s ease-in-out infinite; }
.homeGirl:nth-child(2) svg { animation-delay:.25s; }
.homeGirl:nth-child(3) svg { animation-delay:.5s; }
@keyframes dance { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-10px) rotate(2deg)} }
.homeGirl.sel { background:rgba(253,224,71,.18); box-shadow:0 0 0 3px #fde047, 0 0 24px rgba(253,224,71,.6); }
.homeGirl .gname { text-align:center; font-weight:900; font-size:14px; padding:2px 0 6px; }
.note { position:absolute; font-size:20px; animation:noteup 2.4s ease-out infinite; opacity:0; pointer-events:none; }
@keyframes noteup { 0%{transform:translateY(0);opacity:0} 15%{opacity:1} 100%{transform:translateY(-56px) rotate(20deg);opacity:0} }

#menuGrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
.mcard { border:none; border-radius:22px; padding:14px 6px 12px; color:#fff; font-weight:900; font-size:15px;
  box-shadow:0 6px 0 rgba(0,0,0,.3), 0 8px 20px rgba(0,0,0,.25); position:relative; overflow:hidden; }
.mcard:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.3); }
.mcard .mi { font-size:38px; display:block; margin-bottom:2px; animation:wiggle 3s ease-in-out infinite; }
@keyframes wiggle { 0%,100%{transform:rotate(-4deg) scale(1)} 50%{transform:rotate(4deg) scale(1.1)} }
.mcard::after { content:''; position:absolute; top:-60%; left:-70%; width:50%; height:220%;
  background:rgba(255,255,255,.25); transform:rotate(25deg); animation:sheen 4s ease-in-out infinite; }
@keyframes sheen { 0%,60%{left:-70%} 100%{left:140%} }
.c1{background:linear-gradient(135deg,#f472b6,#a855f7)} .c2{background:linear-gradient(135deg,#38bdf8,#6366f1)}
.c3{background:linear-gradient(135deg,#fb923c,#ef4444)} .c4{background:linear-gradient(135deg,#4ade80,#0d9488)}
.c5{background:linear-gradient(135deg,#fbbf24,#f97316)} .c6{background:linear-gradient(135deg,#c084fc,#38bdf8)}
.c7{background:linear-gradient(135deg,#f43f5e,#a855f7)} .c8{background:linear-gradient(135deg,#2dd4bf,#0ea5e9)}

.bigbtn { border:none; border-radius:20px; padding:13px 22px; font-size:18px; font-weight:900; color:#fff; margin:6px 0;
  background:linear-gradient(135deg,#ff5fa2,#a855f7); box-shadow:0 5px 0 rgba(0,0,0,.3); }
.bigbtn:active { transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,.3); }
.bigbtn.green{background:linear-gradient(135deg,#4ade80,#0ea5e9)} .bigbtn.gold{background:linear-gradient(135deg,#fbbf24,#f97316)}

/* girls */
.girlWrap svg .blink { animation:blink 3.8s infinite; transform-origin:center; transform-box:fill-box; }
@keyframes blink { 0%,94%,100%{transform:scaleY(1)} 96%{transform:scaleY(.08)} }
svg.pop { animation:popin .4s cubic-bezier(.2,1.8,.4,1); }
@keyframes popin { from{transform:scale(.8)} to{transform:scale(1)} }
svg.eating { animation:chew .3s ease-in-out 4; }
@keyframes chew { 50%{transform:translateY(4px) scale(1.02)} }
svg.happyjump { animation:hjump .5s ease-in-out 2; }
@keyframes hjump { 30%{transform:translateY(-16px) rotate(-4deg)} 60%{transform:translateY(0)} 80%{transform:translateY(-8px) rotate(3deg)} }

/* dress up */
#duStage { width:64%; max-width:230px; margin:0 auto; position:relative; }
#duSwitch { display:flex; gap:8px; justify-content:center; margin:4px 0; }
#duSwitch button { border:none; border-radius:16px; padding:6px 14px; font-weight:900; font-size:14px; color:#fff; background:rgba(255,255,255,.15); }
#duSwitch button.sel { background:linear-gradient(135deg,#f472b6,#a855f7); box-shadow:0 0 12px rgba(244,114,182,.8); }
#duTabs { display:flex; gap:6px; width:100%; margin:6px 0 4px; }
#duTabs button { flex:1; border:none; border-radius:14px; padding:9px 2px; font-weight:900; font-size:13px; color:#fff; background:rgba(255,255,255,.13); }
#duTabs button.sel { background:linear-gradient(135deg,#fbbf24,#f97316); }
#duItems { display:flex; gap:8px; width:100%; overflow-x:auto; padding:6px 2px 10px; -webkit-overflow-scrolling:touch; }
.duItem { flex:0 0 auto; width:64px; height:64px; border-radius:18px; border:3px solid transparent; background:rgba(255,255,255,.14);
  font-size:32px; display:flex; align-items:center; justify-content:center; color:#fff; }
.duItem.sel { border-color:#fde047; background:rgba(253,224,71,.25); transform:scale(1.08); }
.duItem .lab { font-size:10px; font-weight:800; }
.duItem.sw { border-radius:50%; }

/* paint */
#paintBox { position:relative; width:100%; max-width:360px; aspect-ratio:5/6; background:#fff; border-radius:22px; overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.4); touch-action:none; }
#paintCanvas { position:absolute; inset:0; width:100%; height:100%; touch-action:none; }
#paintLines { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
svg.lineart * { fill:none !important; stroke:#8b7aa8 !important; stroke-width:2.6 !important; }
#paintTools { display:flex; gap:7px; flex-wrap:wrap; justify-content:center; margin-top:8px; width:100%; }
.swatch { width:40px; height:40px; border-radius:50%; border:3px solid rgba(255,255,255,.4); }
.swatch.sel { border-color:#fde047; transform:scale(1.2); box-shadow:0 0 14px currentColor; }
.toolBtn { width:44px; height:44px; border-radius:14px; border:3px solid transparent; background:rgba(255,255,255,.16); font-size:22px; color:#fff; }
.toolBtn.sel { border-color:#fde047; background:rgba(253,224,71,.25); }
#picRow { display:flex; gap:8px; justify-content:center; margin:4px 0; }
#picRow button { border:none; border-radius:14px; padding:7px 12px; font-weight:900; font-size:13px; color:#fff; background:rgba(255,255,255,.14); }
#picRow button.sel { background:linear-gradient(135deg,#2dd4bf,#a855f7); }

/* kitchen */
#kitScene { position:relative; width:100%; display:flex; align-items:flex-end; justify-content:center; gap:0; min-height:250px; }
#kitGirl { width:38%; max-width:150px; position:relative; }
#bubble { position:absolute; top:-6px; left:50%; transform:translateX(-30%); background:#fff; color:#333; border-radius:18px;
  padding:8px 12px; font-size:20px; font-weight:900; white-space:nowrap; box-shadow:0 4px 12px rgba(0,0,0,.3);
  animation:bubblein .4s cubic-bezier(.2,1.6,.4,1); z-index:5; }
#bubble::after { content:''; position:absolute; bottom:-8px; left:26px; border:9px solid transparent; border-top-color:#fff; border-bottom:0; }
@keyframes bubblein { from{transform:translateX(-30%) scale(.4);opacity:0} to{transform:translateX(-30%) scale(1);opacity:1} }
#vesselBox { width:58%; max-width:230px; position:relative; transition:transform .7s cubic-bezier(.4,0,.2,1); }
#vesselBox.served { transform:translateX(-46%) translateY(-30px) scale(.75); }
#vesselSvg { width:100%; }
#toppings { position:absolute; left:12%; right:12%; top:18%; height:42%; pointer-events:none; }
.topping { position:absolute; font-size:30px; animation:bob 2.2s ease-in-out infinite; filter:drop-shadow(0 2px 2px rgba(0,0,0,.25)); }
@keyframes bob { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-5px) rotate(5deg)} }
.steam { position:absolute; font-size:22px; opacity:0; animation:steamup 2.6s ease-out infinite; pointer-events:none; }
@keyframes steamup { 0%{transform:translateY(0) scaleX(1);opacity:0} 20%{opacity:.7} 100%{transform:translateY(-60px) scaleX(1.6);opacity:0} }
#kitCounter { display:flex; gap:8px; justify-content:center; margin:4px 0; min-height:34px; flex-wrap:wrap; }
.cntChip { background:rgba(255,255,255,.16); border-radius:16px; padding:5px 12px; font-size:17px; font-weight:900; }
.cntChip.match { background:linear-gradient(135deg,#4ade80,#0ea5e9); animation:popin .3s; }
#kitShelf { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; width:100%; margin-top:6px;
  background:rgba(0,0,0,.22); border-radius:22px; padding:10px; }
.ing { border:none; background:rgba(255,255,255,.16); border-radius:18px; font-size:36px; padding:8px 12px;
  box-shadow:0 4px 0 rgba(0,0,0,.25); transition:transform .15s; }
.ing:active { transform:scale(.85); }
.flyer { position:fixed; font-size:34px; z-index:60; pointer-events:none; transition:all .55s cubic-bezier(.5,-0.2,.6,1.2); }
.heart { position:fixed; font-size:28px; z-index:60; pointer-events:none; animation:heartup 1.2s ease-out forwards; }
@keyframes heartup { 0%{transform:scale(.4);opacity:1} 100%{transform:translateY(-90px) scale(1.4);opacity:0} }

/* quiz games */
.prompt { font-size:21px; font-weight:900; text-align:center; margin:6px 0; min-height:30px; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:11px; width:100%; margin-top:6px; }
.tile { border:none; border-radius:20px; padding:16px 0; font-size:40px; font-weight:900; color:#fff;
  background:rgba(255,255,255,.15); box-shadow:0 5px 0 rgba(0,0,0,.28); position:relative; }
.tile:active { transform:translateY(3px); }
.tile.right { background:linear-gradient(135deg,#22c55e,#15803d) !important; animation:zapwin .6s; }
@keyframes zapwin { 30%{transform:scale(1.25) rotate(8deg)} 60%{transform:scale(.95) rotate(-5deg)} }
.tile.wrong { background:#ef4444 !important; animation:shake .35s; }
@keyframes shake { 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
#feedback,#feedback2,#feedback5 { font-size:19px; font-weight:900; text-align:center; min-height:30px; margin-top:8px; color:#fde047; }
.speakBtn { border:none; background:rgba(255,255,255,.2); color:#fff; font-size:24px; border-radius:50%; width:52px; height:52px; margin:2px auto; display:block; }
.speakBtn:active { transform:scale(.85); }
#countField { text-align:center; min-height:120px; margin:4px 0; width:100%; }
.cdemon { display:inline-block; font-size:42px; margin:2px 6px; animation:demonhop 1.2s ease-in-out infinite; }
@keyframes demonhop { 0%,100%{transform:translateY(0) rotate(-6deg)} 50%{transform:translateY(-12px) rotate(6deg)} }
#zapFlash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:70; }
#zapFlash.go { animation:zapfl .35s; }
@keyframes zapfl { 0%{opacity:.9} 100%{opacity:0} }

#wordSlots { display:flex; gap:9px; justify-content:center; margin:8px 0; }
.slot { width:58px; height:68px; border-radius:14px; background:rgba(255,255,255,.14); border:3px dashed rgba(255,255,255,.5);
  font-size:38px; font-weight:900; display:flex; align-items:center; justify-content:center; }
.slot.filled { border-style:solid; border-color:#fde047; background:rgba(253,224,71,.3); animation:popin .35s; }
.bigTarget { font-size:76px; text-align:center; animation:wiggle 3s ease-in-out infinite; }

/* pet */
#petStage { width:56%; max-width:200px; margin:2px auto; }
#petStage svg { width:100%; animation:dance 2s ease-in-out infinite; }
.meter { width:100%; margin:4px 0; }
.meter .lbl { font-size:14px; font-weight:800; margin-bottom:2px; display:flex; justify-content:space-between; }
.meter .bar { height:16px; background:rgba(0,0,0,.35); border-radius:10px; overflow:hidden; }
.meter .fill { height:100%; border-radius:10px; transition:width .6s; background:linear-gradient(90deg,#4ade80,#fde047); }
.petBtns { display:flex; gap:8px; width:100%; margin-top:8px; }
.petBtns button { flex:1; border:none; border-radius:18px; padding:10px 4px; font-size:14px; font-weight:900; color:#fff;
  background:rgba(255,255,255,.17); box-shadow:0 4px 0 rgba(0,0,0,.25); }
.petBtns button:active { transform:translateY(2px); }
.petBtns .ico { font-size:28px; display:block; }
#petMsg { min-height:24px; text-align:center; font-size:16px; font-weight:900; color:#fde047; margin-top:6px; }

.burst { position:fixed; pointer-events:none; font-size:32px; animation:burstup 1s forwards; z-index:99; font-weight:900; }
@keyframes burstup { 0%{transform:scale(.3);opacity:1} 100%{transform:scale(1.9) translateY(-80px);opacity:0} }
#confetti { position:fixed; inset:0; pointer-events:none; z-index:98; }
</style>
</head>
<body>
<div id="bg"></div>
<div id="app">
  <div id="topbar">
    <button id="homeBtn" onclick="go('home')">🏠</button>
    <div class="title">⭐ STAR HUNTERS ⭐</div>
    <div id="stars">⭐ 0</div>
  </div>

  <!-- HOME -->
  <div class="screen active" id="scr-home">
    <h1>STAR HUNTERS</h1>
    <div id="homeGirls" class="girlWrap"></div>
    <div id="menuGrid">
      <button class="mcard c1" onclick="startDressup()"><span class="mi">👗</span>Dress Up</button>
      <button class="mcard c8" onclick="startPaint()"><span class="mi">🎨</span>Painting</button>
      <button class="mcard c3" onclick="startKitchen('ramen')"><span class="mi">🍜</span>Ramen Shop</button>
      <button class="mcard c4" onclick="startKitchen('sushi')"><span class="mi">🍣</span>Sushi Bar</button>
      <button class="mcard c2" onclick="startLetters()"><span class="mi">🔤</span>Letter Zap</button>
      <button class="mcard c5" onclick="startCount()"><span class="mi">🔢</span>Counting</button>
      <button class="mcard c6" onclick="startWord()"><span class="mi">📖</span>Word Magic</button>
      <button class="mcard c7" onclick="go('pet')"><span class="mi">😈</span>Boba Buddy</button>
    </div>
  </div>

  <!-- DRESS UP -->
  <div class="screen" id="scr-dressup">
    <div id="duSwitch"></div>
    <div id="duStage" class="girlWrap"></div>
    <div id="duTabs"></div>
    <div id="duItems"></div>
    <button class="bigbtn gold" onclick="duPhoto()">📸 Photo shoot! +2⭐</button>
  </div>

  <!-- PAINT -->
  <div class="screen" id="scr-paint">
    <div id="picRow"></div>
    <div id="paintBox">
      <canvas id="paintCanvas"></canvas>
      <div id="paintLines"></div>
    </div>
    <div id="paintTools"></div>
    <button class="bigbtn green" onclick="paintDone()">✨ Finished! +3⭐</button>
  </div>

  <!-- KITCHEN -->
  <div class="screen" id="scr-kitchen">
    <h2 id="kitTitle"></h2>
    <div id="kitScene">
      <div id="kitGirl" class="girlWrap"><div id="bubble"></div><div id="kitGirlSvg"></div></div>
      <div id="vesselBox">
        <div id="vesselSvg"></div>
        <div id="toppings"></div>
      </div>
    </div>
    <div id="kitCounter"></div>
    <div id="kitShelf"></div>
    <div style="display:flex; gap:10px;">
      <button class="bigbtn" onclick="kitClear()">🗑️ Empty</button>
      <button class="bigbtn green" onclick="kitServe()">🛎️ Feed her!</button>
    </div>
  </div>

  <!-- LETTERS -->
  <div class="screen" id="scr-letters">
    <h2>🔤 Letter Zap!</h2>
    <div class="prompt" id="letPrompt"></div>
    <button class="speakBtn" onclick="sayLetterAgain()">🔊</button>
    <div class="grid" id="letGrid"></div>
    <div id="feedback"></div>
  </div>

  <!-- COUNT -->
  <div class="screen" id="scr-count">
    <h2>🔢 Counting Beats</h2>
    <div class="prompt">How many little demons?</div>
    <div id="countField"></div>
    <div class="grid" id="countGrid"></div>
    <div id="feedback2"></div>
  </div>

  <!-- WORD -->
  <div class="screen" id="scr-word">
    <h2>📖 Word Magic</h2>
    <div class="bigTarget" id="wordPic"></div>
    <button class="speakBtn" onclick="sayWordAgain()">🔊</button>
    <div id="wordSlots"></div>
    <div class="grid" id="wordGrid"></div>
    <div id="feedback5"></div>
  </div>

  <!-- PET -->
  <div class="screen" id="scr-pet">
    <h2>😈 Boba the Demon Buddy</h2>
    <div id="petStage"></div>
    <div class="meter"><div class="lbl"><span>🍙 Tummy</span><span id="vHunger"></span></div><div class="bar"><div class="fill" id="mHunger"></div></div></div>
    <div class="meter"><div class="lbl"><span>😊 Happy</span><span id="vHappy"></span></div><div class="bar"><div class="fill" id="mHappy"></div></div></div>
    <div class="meter"><div class="lbl"><span>🫧 Clean</span><span id="vClean"></span></div><div class="bar"><div class="fill" id="mClean"></div></div></div>
    <div class="petBtns">
      <button onclick="feedPet()"><span class="ico">🍙</span>Feed ⭐2</button>
      <button onclick="playPet()"><span class="ico">🎤</span>Sing ⭐1</button>
      <button onclick="washPet()"><span class="ico">🛁</span>Bath ⭐1</button>
    </div>
    <div id="petMsg"></div>
  </div>
</div>
<div id="zapFlash"></div>
<canvas id="confetti"></canvas>

<script>
'use strict';
/* ================= STATE ================= */
const DEF_OUTFITS = [
  {outfit:'idol', dressColor:'#a855f7', hairColor:'#7c3aed', acc:['sword','starPin']},
  {outfit:'idol', dressColor:'#ec4899', hairColor:'#db2777', acc:['crown']},
  {outfit:'hoodie', dressColor:'#22c55e', hairColor:'#1f2937', acc:['catEars']},
];
let S;
try { S = JSON.parse(localStorage.getItem('starHunters2')||'{}'); } catch(e){ S={}; }
S.stars = S.stars ?? 6;
S.char = S.char ?? 0;
S.pet = S.pet ?? { hunger:70, happy:70, clean:70, last:Date.now() };
S.outfits = S.outfits ?? JSON.parse(JSON.stringify(DEF_OUTFITS));
function save(){ localStorage.setItem('starHunters2', JSON.stringify(S)); }

const GIRLS = [
  {nm:'Ruby', hair:'braid', skin:'#ffe0cc', greet:"Hi! I'm Ruby! Let's hunt some demons!"},
  {nm:'Mira', hair:'long', skin:'#ffd9c2', greet:"Hey! I'm Mira! Ready to be a star?"},
  {nm:'Zoey', hair:'buns', skin:'#ffe4d0', greet:"Yo! I'm Zoey! Let's gooo!"},
];

function $(id){ return document.getElementById(id); }
function shuffle(a){ return a.sort(()=>Math.random()-.5); }
function girlCfg(i, extra){
  const g = GIRLS[i], o = S.outfits[i];
  return Object.assign({hair:g.hair, skin:g.skin, hairColor:o.hairColor, outfit:o.outfit, dressColor:o.dressColor, acc:o.acc.slice(), mouth:'smile'}, extra||{});
}

/* ================= SOUND ================= */
let AC=null;
function ac(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended') AC.resume(); return AC; }
function tone(f, t, dur, type, vol){
  const a=ac(); if(!a) return;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(f, a.currentTime+t);
  g.gain.setValueAtTime(0, a.currentTime+t);
  g.gain.linearRampToValueAtTime(vol||.25, a.currentTime+t+.02);
  g.gain.exponentialRampToValueAtTime(.001, a.currentTime+t+dur);
  o.connect(g); g.connect(a.destination);

}

  for(let i=0;i<60;i++) parts.push({x:innerWidth/2, y:innerHeight/3, vx:(Math.random()-.5)*13, vy:Math.random()*-10-3,

function ctick(){
  cx.clearRect(0,0,cv.width,cv.height);
  parts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=.35; p.l--; p.a+=.2;
    cx.save(); cx.translate(p.x,p.y); cx.rotate(p.a); cx.fillStyle=p.c; cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6); cx.restore(); });
  parts=parts.filter(p=>p.l>0);
  if(parts.length) requestAnimationFrame(ctick);
}

  else $('paintLines').innerHTML='';

  if(svg){ svg.style.width='100%'; svg.style.height='100%'; svg.setAttribute('preserveAspectRatio','xMidYMid meet'); }
}
function setupCanvas(){
  const c=$('paintCanvas'), box=$('paintBox'), r=box.getBoundingClientRect(), dpr=window.devicePixelRatio||1;
  c.width=r.width*dpr; c.height=r.height*dpr;
  pCtx=c.getContext('2d'); pCtx.scale(dpr,dpr); pCtx.lineCap='round'; pCtx.lineJoin='round';
  drawLineArt();
}
function canvasPt(e){
  const r=$('paintCanvas').getBoundingClientRect();
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}
$('paintCanvas').addEventListener('pointerdown', e=>{
  e.preventDefault(); drawing=true; lastPt=canvasPt(e);
  $('paintCanvas').setPointerCapture(e.pointerId);
  paintStroke(lastPt, lastPt);
});
$('paintCanvas').addEventListener('pointermove', e=>{
  if(!drawing||!pCtx) return; e.preventDefault();
  const pt=canvasPt(e); paintStroke(lastPt, pt); lastPt=pt;
});
$('paintCanvas').addEventListener('pointerup', ()=>{ drawing=false; });
$('paintCanvas').addEventListener('pointercancel', ()=>{ drawing=false; });
function paintStroke(a,b){
  if(pTool==='sparkle'){
    for(let i=0;i<3;i++){
      const x=b.x+(Math.random()-.5)*pSize*2.4, y=b.y+(Math.random()-.5)*pSize*2.4;
      pCtx.fillStyle=`hsl(${Math.random()*60+40},100%,${60+Math.random()*30}%)`;
      drawStar(pCtx,x,y,3+Math.random()*4);
    }
    return;
  }
  pCtx.globalCompositeOperation = pTool==='eraser' ? 'destination-out' : 'source-over';
  if(pTool==='rainbow'){ rainbowHue=(rainbowHue+4)%360; pCtx.strokeStyle=`hsl(${rainbowHue},95%,60%)`; }
  else pCtx.strokeStyle=pColor;
  pCtx.lineWidth=pTool==='eraser'?pSize*2:pSize;
  pCtx.beginPath(); pCtx.moveTo(a.x,a.y); pCtx.lineTo(b.x+.1,b.y+.1); pCtx.stroke();
  pCtx.globalCompositeOperation='source-over';
}
function drawStar(ctx,x,y,r){
  ctx.beginPath();
  for(let i=0;i<10;i++){ const ang=Math.PI/5*i-Math.PI/2, rad=i%2?r/2:r;
    ctx[i?'lineTo':'moveTo'](x+Math.cos(ang)*rad, y+Math.sin(ang)*rad); }
  ctx.closePath(); ctx.fill();
}
function paintClear(){ if(pCtx){ const c=$('paintCanvas'); pCtx.clearRect(0,0,c.width,c.height); } }
function paintDone(){ cheer(); addStars(3); say('Wow! That is so beautiful! You are a real artist!'); }

function newOrder(){

function renderCounter(){
  const counts={};
  kitItems.forEach(i=>counts[i]=(counts[i]||0)+1);

  Object.keys(counts).forEach(k=>{ if(k!==kitOrder.emoji) html+=`<div class="cntChip">${k} ${counts[k]}</div>`; });

function kitAdd(e, emoji, name){
  if(kitBusy) return;
  sPop();
  const btn=e.currentTarget.getBoundingClientRect();

}

  if(kitBusy) return;
  const got = kitItems.filter(x=>x===kitOrder.emoji).length;

    sNo();
    renderKitGirl('oh');

}

/* ================= LETTER ZAP ================= */
const LETTERS='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
let letTarget;
function startLetters(){ go('letters'); nextLetter(); }
function nextLetter(){
  $('feedback').textContent='';

  setTimeout(()=>say('Find the letter '+letTarget),300);
}
function sayLetterAgain(){ say('Find the letter '+letTarget); }
function pickLetter(btn,l){
  if(l===letTarget){
    btn.classList.add('right'); sZap();

const WORDS=[{w:'CAT',pic:'🐱'},{w:'DOG',pic:'🐶'},{w:'SUN',pic:'☀️'},{w:'BAT',pic:'🦇'},{w:'BUG',pic:'🐛'},{w:'HAT',pic:'🎩'},
  {w:'PIG',pic:'🐷'},{w:'CUP',pic:'🥤'},{w:'BUS',pic:'🚌'},{w:'EGG',pic:'🥚'},{w:'FOX',pic:'🦊'},{w:'BED',pic:'🛏️'}];
let wordCur, wordIdx;
function startWord(){ go('word'); nextWord(); }
function nextWord(){
  $('feedback5').textContent='';
  wordCur=WORDS[Math.floor(Math.random()*WORDS.length)]; wordIdx=0;
  $('wordPic').textContent=wordCur.pic;
  renderWordSlots();
  const letters=wordCur.w.split('');
  const extras=shuffle(LETTERS.filter(l=>!letters.includes(l))).slice(0,3);
  $('wordGrid').innerHTML=shuffle([...letters,...extras]).map(l=>`<button class="tile" onclick="pickWordLetter(this,'${l}')">${l}</button>`).join('');
  say('Can you build the word '+wordCur.w.toLowerCase()+'? '+wordCur.w.split('').join(', ')+' spells '+wordCur.w.toLowerCase()+'!');
}
function sayWordAgain(){ say(wordCur.w.split('').join(', ')+' spells '+wordCur.w.toLowerCase()); }
function renderWordSlots(){
  $('wordSlots').innerHTML=wordCur.w.split('').map((l,i)=>`<div class="slot ${i<wordIdx?'filled':''}">${i<wordIdx?l:''}</div>`).join('');
}
function pickWordLetter(btn,l){
  if(l===wordCur.w[wordIdx]){
    wordIdx++; renderWordSlots(); say(l); sPop();
    btn.disabled=true; btn.style.opacity=.25;
    if(wordIdx===wordCur.w.length){
      $('feedback5').textContent=cheer()+' '+wordCur.w+' = '+wordCur.pic;
      addStars(2);
      setTimeout(()=>say(wordCur.w.toLowerCase()+'! You read it!'),800);
      setTimeout(nextWord,2600);
    }
  } else { btn.classList.add('wrong'); sNo(); say('Try another one! We need '+wordCur.w[wordIdx]); setTimeout(()=>btn.classList.remove('wrong'),500); }
}

/* ================= PET ================= */
function decayPet(){
  const hrs=(Date.now()-S.pet.last)/3600000;
  if(hrs>0.1){
    S.pet.hunger=Math.max(0,S.pet.hunger-hrs*6);
    S.pet.happy=Math.max(0,S.pet.happy-hrs*5);
    S.pet.clean=Math.max(0,S.pet.clean-hrs*4);
    S.pet.last=Date.now(); save();
  }
}
function renderPet(mouth){
  decayPet();
  $('petStage').innerHTML=demonSVG({mouth:mouth||'smile'});
  [['Hunger','hunger'],['Happy','happy'],['Clean','clean']].forEach(([n,k])=>{
    $('m'+n).style.width=S.pet[k]+'%';
    $('v'+n).textContent=Math.round(S.pet[k])+'%';
  });
}
function petAction(key,cost,amt,msg,spoken){
  if(S.stars<cost){ $('petMsg').textContent='Play games to earn more ⭐!'; say('Play a game to earn more stars first!'); sNo(); return; }
  S.stars-=cost; S.pet[key]=Math.min(100,S.pet[key]+amt); save(); updStars();
  renderPet('open'); sMunch();
  const r=$('petStage').getBoundingClientRect(); hearts(r.left+r.width/2, r.top+r.height/3, 5);
  $('petMsg').textContent=msg; say(spoken);
  setTimeout(()=>renderPet('smile'), 1200);
}
function feedPet(){ petAction('hunger',2,30,'Yum yum! 🍙','Yum yum yum! Thank you!'); }
function playPet(){ petAction('happy',1,25,'La la laaa! 🎤','La la la! I love singing with you!'); }
function washPet(){ petAction('clean',1,30,'Bubble bubble! 🫧','Splish splash! So clean and shiny!'); }
